
[global]
type=global
endpoint_identifier_order=ip,username

[system]
type=system

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

;[101]
;type=auth
;auth_type=password
;username=phone101
;password=phone101pw


[101]
type=aor
contact=sip:101@127.0.0.1:5065
max_contacts=4
remove_existing=yes
support_path=yes
qualify_frequency=0

[101]
type=endpoint
context=rtt-test
transport=transport-udp
allow=!all,t140,red,ulaw,alaw,g722,h264
max_text_streams=1
direct_media=no
force_rport=yes
disable_direct_media_on_nat=yes
ice_support=no
allow_transfer=yes
trust_id_inbound=yes
send_diversion=yes
rtp_symmetric=yes
rewrite_contact=yes
tos_text=0
cos_text=0
callerid=phone101
;auth=101
;outbound_auth=101
aors=101
identify_by=ip,username

[101-identify]
type=identify
endpoint=101
match=127.0.0.1:5065

