testinfo:
    summary:     'Test a basic IAX2 call using plaintext authentication'
    description: |
        'This test initiates an IAX2 call between 2 instances of Asterisk.
        The test only verifies that an IAX2 call is accepted with good
        authentication.'

properties:
    dependencies:
        - python : 'twisted'
        - python : 'starpy'
        - asterisk : 'chan_iax2'
    tags:
        - iax2

test-modules:
    test-object:
        config-section: test-object-config
        typename: 'test_case.TestCaseModule'
    modules:
        -
            config-section: originator
            typename: 'pluggable_modules.Originator'
        -
            config-section: ami-config
            typename: 'ami.AMIEventModule'
        -
            config-section: hangup-monitor
            typename: 'pluggable_modules.HangupMonitor'

test-object-config:
    asterisk-instances: 2
    connect-ami: True

originator:
    trigger: 'ami_connect'
    id: '0'
    channel: 'IAX2/guest69:passw0rd@127.0.0.1:4569/1000'
    context: 'iaxtest'
    exten: '1000'
    priority: '1'
    async: 'True'

ami-config:
    -
        id: '0'
        type: 'headermatch'
        count: '1'
        conditions:
            match:
                Event: 'Newchannel'
        requirements:
            match:
                Channel: 'IAX2/.*'
    -
        id: '1'
        type: 'headermatch'
        count: '1'
        conditions:
            match:
                Event: 'Newchannel'
        requirements:
            match:
                Channel: 'IAX2/.*'
    -
        id: '0'
        type: 'headermatch'
        count: '1'
        conditions:
            match:
                Event: 'Hangup'
        requirements:
            match:
                Channel: 'IAX2/.*'
                Cause: '16'
    -
        id: '1'
        type: 'headermatch'
        count: '1'
        conditions:
            match:
                Event: 'Hangup'
        requirements:
            match:
                Channel: 'IAX2/.*'
                Cause: '16'

hangup-monitor:
    ids: '0'

