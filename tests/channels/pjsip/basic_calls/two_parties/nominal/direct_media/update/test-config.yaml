testinfo:
    skip: 'Using UPDATE seems to be broken.  Skipping until resolved'
    summary:     'Test basic two-party direct-media call using UPDATEs'
    description: |
        'This test verifies that alice can call bob with both of them having
        direct_media enabled using UPDATEs and the UPDATEs get processed correctly.'

properties:
    dependencies:
        - python : 'twisted'
        - python : 'starpy'
        - asterisk : 'res_pjsip'
        - sipp :
            version : 'v3.0'
    tags:
        - pjsip

test-modules:
    add-test-to-search-path: 'True'
    test-object:
        -
            # The Notify with a SIP frag of 100 are now sent later
            config-section: test-case-config
            typename: 'sipp.SIPpTestCase'

test-case-config:
    memcheck-delay-stop: 7
    reactor-timeout: 15
    connect-ami: 'True'
    fail-on-any: True
    test-iterations:
        -
            scenarios:
                # Bob receives call from Alice and sends audio.
                - { 'key-args': {'scenario': 'bob.xml', '-p': '5060', '-i': '127.0.0.3', '-s': 'alice', '-timeout': '20s',  '-mi': '127.0.0.3'},
                    'ordered-args': ['-timeout_error', '-key', 'custom_media_port', '6004'] }
                # Alice calls Bob and sends audio.
                - { 'key-args': {'scenario': 'alice.xml', '-p': '5060', '-i': '127.0.0.2', '-s': 'bob', '-timeout': '20s',  '-mi': '127.0.0.2'},
                    'ordered-args': ['-timeout_error', '-key', 'custom_media_port', '6004'] }

