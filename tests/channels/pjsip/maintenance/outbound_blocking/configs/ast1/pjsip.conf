[system]
type=system
timer_t1=100
timer_b=6400

[global]
type=global
debug=yes

[local]
type=transport
protocol=udp
bind=0.0.0.0

; Endpoint "alice" - no registered contact is needed.  The session_create
; supplement check in ast_sip_session_create_outgoing() fires before any
; contact or AOR lookup, so the origination is refused immediately.
[alice]
type=endpoint
transport=local
context=default
disallow=all
allow=ulaw
