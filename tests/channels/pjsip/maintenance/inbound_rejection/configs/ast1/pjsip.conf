[system]
type=system
timer_t1=100
timer_b=6400

[global]
type=global
debug=yes

[local]
type=transport
protocol=udp
bind=0.0.0.0

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[alice]
type=endpoint
transport=local
context=default
direct_media=no
disallow=all
allow=ulaw

[alice-identify]
type=identify
endpoint=alice
match=127.0.0.1
