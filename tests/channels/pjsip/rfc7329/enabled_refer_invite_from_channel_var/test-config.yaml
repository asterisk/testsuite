testinfo:
    summary: 'RFC7329 enabled: channel-var REFER with with_sid caller/callee'
    description: |
        'If SIPSESSIONID_REFERTO is set on the channel before Dial(), and both
         legs use Session-ID, the outgoing INVITE must carry a valid RFC7329
         Session-ID.'

test-modules:
    test-object:
        config-section: test-object-config
        typename: 'sipp.SIPpTestCase'

test-object-config:
    memcheck-delay-stop: 7
    test-iterations:
        -
            scenarios:
                - { 'key-args': {'scenario': 'bob_with_sid.xml', '-i': '127.0.0.1', '-p': '5062'} }
                - { 'key-args': {'scenario': 'alice_with_sid.xml', '-i': '127.0.0.1', '-p': '5061', '-s': 'bob'} }

properties:
    dependencies:
        - app: 'sipp'
        - asterisk: 'app_dial'
        - asterisk: 'chan_pjsip'
        - asterisk: 'res_pjsip'
        - asterisk: 'res_pjsip_refer'
        - asterisk: 'res_pjsip_rfc7329'
    tags:
        - pjsip
        - rfc7329
