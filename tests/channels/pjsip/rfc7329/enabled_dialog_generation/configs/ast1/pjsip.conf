[global]
type=global
rfc7329_enable=yes

[transport-udp]
type=transport
protocol=udp
bind=127.0.0.1:5060

[endpoint-template](!)
type=endpoint
transport=transport-udp
context=default
identify_by=ip
direct_media=no
disallow=all
allow=ulaw

[aor-template](!)
type=aor
max_contacts=1

[alice](aor-template)
contact=sip:alice@127.0.0.1:5061

[alice](endpoint-template)
aors=alice

[bob](aor-template)
contact=sip:bob@127.0.0.1:5062

[bob](endpoint-template)
aors=bob

[alice-identify]
type=identify
endpoint=alice
match=127.0.0.1:5061

[bob-identify]
type=identify
endpoint=bob
match=127.0.0.1:5062
