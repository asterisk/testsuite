testinfo:
    summary: 'RFC7329 enabled: store Refer-To Session-ID with with_sid legs'
    description: |
        'When an inbound REFER contains a Session-ID URI header parameter
         in Refer-To and all legs use Session-ID, Asterisk must persist it
         and use it on the outbound INVITE sent to the transfer target.'

test-modules:
    test-object:
        config-section: test-object-config
        typename: 'sipp.SIPpTestCase'
    modules:
        -
            config-section: ami-config
            typename: 'ami.AMIEventModule'

test-object-config:
    memcheck-delay-stop: 7
    fail-on-any: False
    test-iterations:
        -
            scenarios:
                - { 'key-args': {'scenario': 'charlie.xml', '-i': '127.0.0.1', '-p': '5063'} }
                - { 'key-args': {'scenario': 'bob_with_sid.xml', '-i': '127.0.0.1', '-p': '5062'} }
                - { 'key-args': {'scenario': 'alice_with_sid.xml', '-i': '127.0.0.1', '-p': '5061', '-s': 'bob', '-sleep': '1'} }

ami-config:
    -
        type: 'headermatch'
        conditions:
            match:
                Event: 'VarSet'
                Variable: '__SIPSESSIONID_REFERTO'
                Value: '00112233445566778899aabbccddeeff'
        count: '>0'
    -
        type: 'headermatch'
        conditions:
            match:
                Event: 'UserEvent'
                UserEvent: 'Result'
                Status: 'passed'
        count: '>0'

properties:
    dependencies:
        - python: 'twisted'
        - python: 'starpy'
        - app: 'sipp'
        - asterisk: 'app_dial'
        - asterisk: 'app_userevent'
        - asterisk: 'chan_pjsip'
        - asterisk: 'res_pjsip'
        - asterisk: 'res_pjsip_refer'
        - asterisk: 'res_pjsip_rfc7329'
    tags:
        - pjsip
        - rfc7329
