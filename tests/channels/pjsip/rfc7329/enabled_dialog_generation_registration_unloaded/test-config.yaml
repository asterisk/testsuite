testinfo:
    summary: 'RFC7329 enabled + module unloaded + auth registration'
    description: |
        'With rfc7329_enable=yes but res_pjsip_rfc7329 not loaded,
         a REGISTER transaction with Session-ID must not return Session-ID
         in Asterisk responses.'

test-modules:
    test-object:
        config-section: test-object-config
        typename: 'sipp.SIPpTestCase'

test-object-config:
    memcheck-delay-stop: 7
    test-iterations:
        -
            scenarios:
                - { 'key-args': {'scenario': 'alice_register_with_sid.xml', '-i': '127.0.0.1', '-p': '5061'} }

properties:
    dependencies:
        - app: 'sipp'
        - asterisk: 'chan_pjsip'
        - asterisk: 'res_pjsip'
        - asterisk: 'res_pjsip_registrar'
        - asterisk: 'res_pjsip_endpoint_identifier_user'
        - asterisk: 'res_pjsip_authenticator_digest'
        - asterisk: 'res_pjsip_session'
    tags:
        - pjsip
        - rfc7329
