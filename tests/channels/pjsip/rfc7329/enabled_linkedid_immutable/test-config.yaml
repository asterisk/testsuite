testinfo:
    summary: 'RFC7329 enabled: linkedid propagation with with_sid caller/callee'
    description: |
        'With Session-ID present on both legs, inbound Session-ID must be
         reused on the outbound leg, and attempts to modify Session-ID via
         PJSIP_HEADER(add/update/remove) must be ignored.'

test-modules:
    test-object:
        config-section: test-object-config
        typename: 'sipp.SIPpTestCase'

test-object-config:
    memcheck-delay-stop: 7
    test-iterations:
        -
            scenarios:
                - { 'key-args': {'scenario': 'bob_with_sid.xml', '-i': '127.0.0.1', '-p': '5062'} }
                - { 'key-args': {'scenario': 'alice.xml', '-i': '127.0.0.1', '-p': '5061', '-s': 'bob'} }

properties:
    dependencies:
        - app: 'sipp'
        - asterisk: 'app_dial'
        - asterisk: 'chan_pjsip'
        - asterisk: 'res_pjsip'
        - asterisk: 'res_pjsip_header_funcs'
        - asterisk: 'res_pjsip_session'
        - asterisk: 'res_pjsip_rfc7329'
    tags:
        - pjsip
        - rfc7329
