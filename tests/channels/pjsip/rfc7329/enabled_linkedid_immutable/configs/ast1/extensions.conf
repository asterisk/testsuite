[default]

exten => bob,1,Dial(PJSIP/bob,,b(default^mutate_headers^1))
 same => n,Hangup()

exten => mutate_headers,1,NoOp()
 same => n,Set(PJSIP_HEADER(add,Session-ID)=89abcdef0123456789abcdef01234567)
 same => n,Set(PJSIP_HEADER(update,Session-ID)=fedcba9876543210fedcba9876543210)
 same => n,Set(PJSIP_HEADER(remove,Session-ID)=)
 same => n,Set(PJSIP_HEADER(remove,Session-*)=)
 same => n,Set(PJSIP_HEADER(remove,*)=)
 same => n,Return()
