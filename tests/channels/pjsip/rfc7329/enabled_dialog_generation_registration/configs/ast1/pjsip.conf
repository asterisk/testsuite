[global]
type=global
rfc7329_enable=yes

[transport-udp]
type=transport
protocol=udp
bind=127.0.0.1:5060

[endpoint-template](!)
type=endpoint
transport=transport-udp
context=default
identify_by=username
direct_media=no
disallow=all
allow=ulaw

[aor-template](!)
type=aor
max_contacts=1

[auth-template](!)
type=auth
auth_type=userpass

[alice](aor-template)

[alice](endpoint-template)
aors=alice
auth=alice-auth

[alice-auth](auth-template)
username=alice
password=alicepass

[bob](aor-template)

[bob](endpoint-template)
aors=bob
auth=bob-auth

[bob-auth](auth-template)
username=bob
password=bobpass
